<header class="site-header">

  <div class="wrapper">

    <a class="site-title" rel="author" href="{{ '/' | relative_url }}">{{ site.title | escape }}</a>
  </div>
  <div class="wrapper">
    {%- unless page_titles == empty %}
      <nav class="site-nav">
        {% include nav.html paths = page_paths %}
      </nav>
    {%- endunless %}
  </div>
</header>
