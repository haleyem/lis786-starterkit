---
layout: base
---
<article>
    <header class="post-header">
        <h1 class="post-title">{{ page.title | escape }}</h1>
    </header>
<div>
<ul>
    {% for post.tags in site.documents %}
    {% for tag in page.tags %}
    {% if page.tags contains [page.tags] %}  
    <li>
        <a href="/lis786-starterkit{{ post.url }}">{{ post.title }}</a>
    </li>
    {% endif %}
    {% endfor %}
    {% endfor %}
</ul>
{{ content }}
Browse more <a href="/lis786-starterkit/tags">tags</a>.
</div>
</article>
