---
layout: base
---
<article>
    <header class="post-header">
        <h1 class="post-title">{{ page.title | escape }}</h1>
    </header>
<div>
    {% assign my_tag = tags }
    {{ page[my_tag] }}
    {% for post in site.documents %}
<ul>  
    <li>
        <a href="/lis786-starterkit{{ post.url }}">{{ post.title }}</a>
    </li>
    {% endfor %}
</ul>
{{ content }}
Browse more <a href="/lis786-starterkit/tags">tags</a>.
</div>
</article>
